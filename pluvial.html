<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAZ Pluvial — 3D + AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(135deg, #0d1b3e, #0a2a5e);
            padding: 20px 16px;
            text-align: center;
            border-bottom: 2px solid #0066ff33;
        }
        header h1 { color: #3399ff; font-size: 1.5rem; letter-spacing: 1px; }
        header p { color: #7799cc; margin-top: 4px; font-size: 0.8rem; }
        .badge {
            display: inline-block;
            background: #0066ff20;
            border: 1px solid #0066ff44;
            color: #3399ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin: 3px;
        }
        .viewer-container {
            width: 100%;
            max-width: 1000px;
            height: 70vh;
            min-height: 400px;
            margin: 10px auto;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            background: #0d0d1a;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            --progress-bar-color: #3399ff;
            --progress-bar-height: 4px;
        }
        .info-grid {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            padding: 0 12px;
        }
        .info-card {
            background: #16213e;
            border: 1px solid #1a3a5c;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .info-card .icon { font-size: 1.4rem; margin-bottom: 2px; }
        .info-card .label { font-size: 0.6rem; color: #7799cc; text-transform: uppercase; letter-spacing: 1px; }
        .info-card .value { font-size: 0.9rem; font-weight: 600; color: #fff; margin-top: 2px; }
        footer {
            text-align: center;
            padding: 12px;
            color: #334;
            font-size: 0.65rem;
            border-top: 1px solid #1a1a2e;
            margin-top: auto;
        }
        .loading-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0d0d1a; z-index: 5;
            transition: opacity 0.5s;
        }
        .loading-overlay.done { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: #3399ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .viewer-container { height: 55vh; min-height: 300px; border-radius: 8px; }
            header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>💧 Proyecto PAZ — Pluvial 3D</h1>
    <p>La Paz, BCS · SOH — Servicios y Obras Hidráulicas</p>
    <span class="badge">🌧️ Pluvial</span>
    <span class="badge">🏢 12 Niveles</span>
    <span class="badge">🥽 AR Ready</span>
</header>

<div class="viewer-container">
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p style="margin-top:12px;color:#7799cc;font-size:0.85rem;">Cargando modelo pluvial...</p>
    </div>
    <model-viewer id="mv"
        src="https://cdn.jsdelivr.net/gh/hrubio-lang/paz-sanitario-ar@main/pluvial_draco.glb"
        alt="Instalación Pluvial Proyecto PAZ"
        ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
        camera-controls touch-action="pan-y"
        shadow-intensity="0.7" shadow-softness="0.8"
        environment-image="apartment" exposure="1.3"
        camera-target="auto auto auto" camera-orbit="45deg 60deg auto"
        field-of-view="45deg" bounds="tight" loading="eager" reveal="auto">
        <button slot="ar-button" style="
            background:linear-gradient(135deg,#0066ff,#3399ff);color:#fff;
            border:none;padding:14px 24px;border-radius:30px;font-weight:700;
            font-size:1rem;cursor:pointer;display:flex;align-items:center;gap:8px;
            box-shadow: 0 4px 20px rgba(0,102,255,0.4);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
            </svg>
            Ver en tu espacio 🥽
        </button>
    </model-viewer>
</div>

<div class="info-grid">
    <div class="info-card"><div class="icon">💧</div><div class="label">Especialidad</div><div class="value">Pluvial</div></div>
    <div class="info-card"><div class="icon">📏</div><div class="label">Elementos</div><div class="value">~4,800</div></div>
    <div class="info-card"><div class="icon">⚖️</div><div class="label">Tamaño</div><div class="value">7.4 MB</div></div>
    <div class="info-card"><div class="icon">🏢</div><div class="label">Niveles</div><div class="value">S2 → N7</div></div>
</div>

<footer>
    SOH — Servicios y Obras Hidráulicas · Proyecto PAZ · La Paz, BCS · 2026
</footer>

<script>
    const mv = document.getElementById('mv');
    const loader = document.getElementById('loader');

    mv.addEventListener('load', () => {
        loader.classList.add('done');
        setTimeout(() => { if (loader.parentNode) loader.remove(); }, 600);
    });

    mv.addEventListener('error', () => {
        loader.innerHTML = '<p style="color:#ff6b6b;">⚠️ Error al cargar el modelo</p>';
    });

    mv.addEventListener('progress', (e) => {
        if (e.detail.totalProgress > 0.01) {
            const pct = Math.round(e.detail.totalProgress * 100);
            loader.innerHTML = '<p style="color:#3399ff;font-weight:600;">Cargando modelo pluvial...</p>' +
                '<div style="width:70%;height:6px;background:#333;border-radius:3px;margin:8px auto;">' +
                '<div style="width:' + pct + '%;height:100%;background:#3399ff;border-radius:3px;transition:width 0.2s;"></div></div>' +
                '<p style="font-size:0.75rem;color:#7799cc;">' + pct + '%</p>';
        }
    });

    console.log('PAZ · Pluvial 3D + AR | SOH 2026');
</script>

</body>
</html>
