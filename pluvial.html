<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAZ Pluvial — 3D + AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;background:#0a0a14;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif}
        model-viewer{width:100%;height:100%;--progress-bar-color:#3399ff;--progress-bar-height:6px}
    </style>
</head>
<body>
<model-viewer
    src="https://cdn.jsdelivr.net/gh/hrubio-lang/paz-sanitario-ar@main/pluvial_draco.glb"
    alt="Pluvial PAZ"
    ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
    camera-controls touch-action="pan-y"
    shadow-intensity="0.7" shadow-softness="0.8"
    exposure="1.3"
    camera-target="auto auto auto" camera-orbit="45deg 60deg auto"
    field-of-view="45deg" bounds="tight">
    <button slot="ar-button" style="
        background:linear-gradient(135deg,#0066ff,#3399ff);color:#fff;
        border:none;padding:14px 24px;border-radius:30px;font-weight:700;
        font-size:1rem;cursor:pointer;display:flex;align-items:center;gap:8px;
        box-shadow:0 4px 20px rgba(0,102,255,0.5);position:absolute;bottom:20px;right:20px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
        Ver en tu espacio 🥽
    </button>
</model-viewer>
</body>
</html>
