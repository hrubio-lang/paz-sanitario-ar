<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAZ Pluvial — 3D + AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body{ background:#0a0a14; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; }
        header{ background:linear-gradient(135deg,#0d1b3e,#0a2a5e); padding:16px; text-align:center; border-bottom:2px solid #3399ff44; }
        header h1{ color:#3399ff; font-size:1.3rem; }
        header p{ color:#6699cc; font-size:0.75rem; margin-top:3px; }
        model-viewer{ width:100vw; height:calc(100vh - 80px); display:block; --progress-bar-color:#3399ff; --progress-bar-height:4px; }
        footer{ text-align:center; padding:8px; color:#334; font-size:0.6rem; margin-top:auto; }
    </style>
</head>
<body>
<header>
    <h1>💧 Proyecto PAZ — Instalación Pluvial</h1>
    <p>La Paz, BCS · SOH — Servicios y Obras Hidráulicas</p>
</header>

<model-viewer
    src="https://cdn.jsdelivr.net/gh/hrubio-lang/paz-sanitario-ar@main/pluvial_draco.glb"
    alt="Instalación Pluvial Proyecto PAZ"
    ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
    camera-controls touch-action="pan-y"
    shadow-intensity="0.7" shadow-softness="0.8"
    environment-image="apartment" exposure="1.3"
    camera-target="auto auto auto" camera-orbit="45deg 60deg auto"
    field-of-view="45deg" bounds="tight" loading="eager"
    style="background:radial-gradient(circle at center, #1a1a3e 0%, #0a0a14 70%);">
    <button slot="ar-button" style="
        background:linear-gradient(135deg,#0066ff,#3399ff);color:#fff;
        border:none;padding:14px 22px;border-radius:28px;font-weight:700;
        font-size:0.95rem;cursor:pointer;display:flex;align-items:center;gap:8px;
        box-shadow:0 4px 20px rgba(0,102,255,0.5);position:absolute;bottom:20px;right:20px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
        </svg>
        Ver en tu espacio 🥽
    </button>
</model-viewer>

<footer>SOH · Servicios y Obras Hidráulicas · Proyecto PAZ · La Paz, BCS · 2026</footer>

<script>
    const mv = document.querySelector('model-viewer');
    mv.addEventListener('load', () => console.log('✅ Modelo pluvial cargado'));
    mv.addEventListener('error', (e) => console.error('❌ Error:', e));
    mv.addEventListener('progress', (e) => {
        if(e.detail.totalProgress > 0) console.log('📦', Math.round(e.detail.totalProgress*100)+'%');
    });
</script>
</body>
</html>
