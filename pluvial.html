<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAZ Pluvial — 3D + AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a14;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
        header{background:linear-gradient(135deg,#0d1b3e,#0a2a5e);padding:14px 16px;text-align:center;border-bottom:2px solid #3399ff44}
        header h1{color:#3399ff;font-size:1.3rem}
        header p{color:#6699cc;font-size:0.7rem;margin-top:2px}
        #viewer-wrap{flex:1;position:relative;overflow:hidden}
        model-viewer{width:100%;height:100%;--progress-bar-color:#3399ff;--progress-bar-height:6px}
        #status{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0d1a;z-index:10;transition:opacity 0.4s}
        #status.done{opacity:0;pointer-events:none}
        .spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#3399ff;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #status p{margin-top:12px;color:#7799cc;font-size:0.85rem}
    </style>
</head>
<body>
<header>
    <h1>💧 Proyecto PAZ — Instalación Pluvial</h1>
    <p>La Paz, BCS · SOH</p>
    <span style="display:inline-block;background:#0066ff20;border:1px solid #0066ff44;color:#3399ff;padding:3px 10px;border-radius:14px;font-size:0.65rem;margin:3px">🌧️ Pluvial</span>
    <span style="display:inline-block;background:#0066ff20;border:1px solid #0066ff44;color:#3399ff;padding:3px 10px;border-radius:14px;font-size:0.65rem;margin:3px">🥽 AR</span>
</header>
<div id="viewer-wrap">
    <div id="status"><div class="spinner"></div><p id="msg">Inicializando visor 3D...</p></div>
    <model-viewer id="mv"
        camera-controls touch-action="pan-y"
        shadow-intensity="0.7" shadow-softness="0.8"
        environment-image="apartment" exposure="1.3"
        camera-target="auto auto auto" camera-orbit="45deg 60deg auto"
        field-of-view="45deg" bounds="tight">
        <button slot="ar-button" style="
            background:linear-gradient(135deg,#0066ff,#3399ff);color:#fff;
            border:none;padding:12px 20px;border-radius:24px;font-weight:700;
            font-size:0.9rem;cursor:pointer;display:flex;align-items:center;gap:6px;
            box-shadow:0 4px 18px rgba(0,102,255,0.5);position:absolute;bottom:18px;right:18px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
            </svg>
            Ver en tu espacio 🥽
        </button>
    </model-viewer>
</div>
<script>
    const mv = document.getElementById('mv');
    const status = document.getElementById('status');
    const msg = document.getElementById('msg');
    const CDN = 'https://cdn.jsdelivr.net/gh/hrubio-lang/paz-sanitario-ar@main';

    // Pre-calentar el decoder Draco con el modelo sanitario (que sí funciona)
    const warmup = document.createElement('model-viewer');
    warmup.src = CDN + '/modelo_draco.glb';
    warmup.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none';
    warmup.setAttribute('loading', 'eager');
    document.getElementById('viewer-wrap').appendChild(warmup);

    warmup.addEventListener('load', () => {
        console.log('🔧 Decoder Draco inicializado');
        warmup.remove();
        msg.textContent = 'Cargando modelo pluvial...';
        mv.src = CDN + '/pluvial_draco.glb';
        mv.setAttribute('loading', 'eager');
    });

    warmup.addEventListener('error', () => {
        // Si el warmup falla, intentar cargar pluvial directamente
        console.warn('⚠️ Warmup falló, cargando pluvial directo...');
        warmup.remove();
        mv.src = CDN + '/pluvial_draco.glb';
        mv.setAttribute('loading', 'eager');
    });

    mv.addEventListener('progress', e => {
        const p = Math.round(e.detail.totalProgress * 100);
        msg.textContent = 'Cargando modelo pluvial... ' + p + '%';
    });

    mv.addEventListener('load', () => {
        status.classList.add('done');
        console.log('✅ Pluvial listo');
    });

    mv.addEventListener('error', e => {
        msg.textContent = '⚠️ Error al cargar. Recarga la página.';
        msg.style.color = '#ff6b6b';
        console.error(e);
    });
</script>
</body>
</html>
